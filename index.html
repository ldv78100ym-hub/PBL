<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PBL 3D - Red Bull Sky & Dirt Challenge</title>
    <!-- MathJax 3 -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', 'Inter', sans-serif;
        }
        .legend-3d {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 10px 18px;
            border-radius: 24px;
            font-size: 0.75rem;
            color: #ccddf8;
            display: flex;
            gap: 20px;
            z-index: 100;
            pointer-events: none;
            font-weight: 500;
        }
        .legend-3d span {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .sphere-badge {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: inline-block;
        }
        .badge-main { background: radial-gradient(circle at 30% 30%, #f3c65e, #c9921a); box-shadow: 0 0 6px gold; }
        .badge-sub { background: radial-gradient(circle at 30% 30%, #3282b0, #1d4c6e); box-shadow: 0 0 4px #4aa3d4; }
        .badge-copyright { background: radial-gradient(circle at 30% 30%, #b86f9c, #6a3e5a); box-shadow: 0 0 6px #d48bcb; }
        .instruction {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.7rem;
            color: #aaa;
            pointer-events: none;
            font-family: monospace;
            z-index: 100;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div class="legend-3d">
        <span><div class="sphere-badge badge-main"></div> Nœud principal (énoncé / annexes / cartes joker)</span>
        <span><div class="sphere-badge badge-sub"></div> Sous-document (arc de cercle élargi)</span>
        <span><div class="sphere-badge badge-copyright"></div> ⚖️ Droits d'auteur (étoile solitaire)</span>
        <span>🖱️ Cliquez sur une sphère → ouvrir le PDF / afficher les droits</span>
    </div>
    <div class="instruction">
        🖱️ Souris : rotation / clic-droit pan | Scroll zoom
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // -------- DONNÉES DES DOCUMENTS (PDF) ----------
        const mainNodesData = [
            { id: "main_enonce", label: "📄 L'ÉNONCÉ", type: "main", pdf: "RED_BULL_SKY_AND_DIRT_CHALLENGE_V2.pdf", group: "enonce" },
            { id: "main_annexes", label: "📚 LES ANNEXES", type: "main", pdf: null, group: "annexes" },
            { id: "main_cartes", label: "🎴 CARTES JOKER", type: "main", pdf: null, group: "cartes" }
        ];

        const subDocuments = {
            enonce: [
                { label: "DOSSIER SYNTHESE MAQUETTE", pdf: "DOSSIER_SYNTHESE_MAQUETTE.pdf" },
                { label: "CRITERES EVALUATION PROFS", pdf: "CRITERES_EVALUATION_PROFS.pdf" },
                { label: "COMMUNICATION PREPARATOIRE", pdf: "COMMUNICATION_PREPARATOIRE_VERS_ELEVES_ET_ENSEIGNANTS.pdf" },
                { label: "DOSSIER SYNTHESE SOUS-GROUPE", pdf: "DOSSIER_SYNTHESE_SOUS_GROUPE_MAQUETTE.pdf" }
            ],
            annexes: [
                { label: "TRIGONOMETRIE TABLEAU BILAN", pdf: "TRIGONOMETRIE_TABLEAU_BILAN.pdf" },
                { label: "PYTHON V2", pdf: "PYTHON_V2.pdf" },
                { label: "LIAISONS PARTIES", pdf: "LIAISONS_PARTIES.pdf" },
                { label: "LIAISONS DOCUMENTS", pdf: "LIAISONS_DOCUMENTS.pdf" },
                { label: "FICHE SYNTHESE", pdf: "FICHE_SYNTHESE.pdf" },
                { label: "DOSSIER SYNTHESE PYTHON", pdf: "DOSSIER_SYNTHESE_PYTHON.pdf" }
            ],
            cartes: [
                { label: "CARTES JOKER DERIVATION", pdf: "CARTES_JOKER_DERIVATION.pdf" },
                { label: "CARTES JOKER DERIVEES PCM", pdf: "CARTES_JOKER_DERIVEES_PCM.pdf" },
                { label: "CARTES JOKER FONCTIONS", pdf: "CARTES_JOKER_FONCTIONS.pdf" },
                { label: "CARTES JOKER PRODUIT SCALAIRE", pdf: "CARTES_JOKER_PRODUIT_SCALAIRE.pdf" },
                { label: "CARTES JOKER SECOND DEGRE", pdf: "CARTES_JOKER_SECOND_DEGRE.pdf" },
                { label: "CARTES JOKER STATISTIQUES PROBABILITES", pdf: "CARTES_JOKER_STATISTIQUES_PROBABILITES.pdf" },
                { label: "CARTES JOKER SUITES", pdf: "CARTES_JOKER_SUITES.pdf" },
                { label: "CARTES JOKER TRIGONOMETRIE", pdf: "CARTES_JOKER_TRIGONOMETRIE.pdf" }
            ]
        };

        // Paramètres géométriques (distance élargie)
        const radiusTriangle = 3.8;
        const arcRadius = 4.2;
        const arcAngleRange = Math.PI * 0.85;
        
        const anglesMain = [Math.PI / 2, (7 * Math.PI) / 6, (11 * Math.PI) / 6];
        const positionsMain = anglesMain.map(ang => new THREE.Vector3(
            radiusTriangle * Math.cos(ang),
            0,
            radiusTriangle * Math.sin(ang)
        ));
        
        const groupOrder = ["enonce", "annexes", "cartes"];
        const mainPositionsMap = {};
        groupOrder.forEach((group, idx) => {
            mainPositionsMap[group] = positionsMain[idx];
        });

        const centerTriangle = new THREE.Vector3(0, 0, 0);
        
        function computeSubPositions(parentPos, groupId, subCount) {
            const outwardDir = parentPos.clone().sub(centerTriangle).normalize();
            let baseAngle = Math.atan2(outwardDir.z, outwardDir.x);
            const startAngle = baseAngle - arcAngleRange / 2;
            const endAngle = baseAngle + arcAngleRange / 2;
            const positions = [];
            if (subCount === 1) {
                const midAngle = baseAngle;
                const px = parentPos.x + arcRadius * Math.cos(midAngle);
                const pz = parentPos.z + arcRadius * Math.sin(midAngle);
                positions.push(new THREE.Vector3(px, 0.15, pz));
            } else {
                for (let i = 0; i < subCount; i++) {
                    const t = i / (subCount - 1);
                    const angle = startAngle + t * arcAngleRange;
                    const px = parentPos.x + arcRadius * Math.cos(angle);
                    const pz = parentPos.z + arcRadius * Math.sin(angle);
                    positions.push(new THREE.Vector3(px, 0.1, pz));
                }
            }
            return positions;
        }

        const allNodes = [];
        mainNodesData.forEach(main => {
            const pos = mainPositionsMap[main.group];
            allNodes.push({
                id: main.id,
                label: main.label,
                type: "main",
                pdf: main.pdf,
                group: main.group,
                position: pos,
                children: []
            });
        });

        const subNodesList = [];
        for (let [group, docs] of Object.entries(subDocuments)) {
            const parentNode = allNodes.find(n => n.group === group && n.type === "main");
            if (!parentNode) continue;
            const positionsSub = computeSubPositions(parentNode.position, group, docs.length);
            docs.forEach((doc, idx) => {
                const subId = `sub_${group}_${idx}`;
                const subNode = {
                    id: subId,
                    label: doc.label,
                    type: "sub",
                    pdf: doc.pdf,
                    group: group,
                    position: positionsSub[idx],
                    parentId: parentNode.id
                };
                subNodesList.push(subNode);
                allNodes.push(subNode);
                parentNode.children.push(subNode);
            });
        }

        // ---------- AJOUT DE L'ÉTOILE SOLITAIRE (Droits d'auteur) ----------
        // Position choisie : en bas à gauche de la scène, bien visible mais séparée
        const copyrightPos = new THREE.Vector3(-5.5, -1.2, 4.2);
        const copyrightNode = {
            id: "copyright_node",
            label: "⚖️ Droits d'Auteur & Licence",
            type: "copyright",
            pdf: null,  // pas de PDF, mais affichage d'un texte long
            group: "copyright",
            position: copyrightPos,
            fullText: `⚖️ Droits d'Auteur et Licence d'Utilisation

Auteur : Yann Merdy (yann.merdy@gmail.com) - Avril 2026

Licence d'Utilisation Non Commerciale

Ce code HTML/CSS/JavaScript ainsi que le contenu généré par l'application ("Cours et Exercices Dynamiques : Le Produit Scalaire") sont la propriété intellectuelle exclusive de l'auteur, Yann Merdy.

Conditions :
Utilisation Privée et Éducative (Autorisée) : Vous êtes autorisé.e à utiliser, copier, modifier et distribuer ce code et son contenu **uniquement** à des fins **personnelles, éducatives et non lucratives.**
Utilisation Commerciale (Interdite) : Toute utilisation, distribution, intégration ou reproduction du code ou du contenu (total ou partiel) à des fins **commerciales, lucratives ou professionnelles** est **strictement interdite** sans un accord écrit préalable et explicite de l'auteur.
Attribution : Toute reproduction ou modification doit conserver la mention de l'auteur originale (Yann Merdy) et la présente notice de droits d'auteur.

Pour toute demande d'utilisation commerciale ou de licence spécifique, veuillez contacter l'auteur à l'adresse indiquée ci-dessus.

⚠️ Tous les documents PDF référencés dans cette page (énoncé, annexes, cartes joker, etc.) sont également couverts par les mêmes conditions de droits d'auteur.`
        };
        allNodes.push(copyrightNode);

        // ----- SCÈNE THREE.JS -----
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b16);
        scene.fog = new THREE.FogExp2(0x050b16, 0.008);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(9, 6, 11);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.target.set(0, 0.2, 0);
        
        // Lumières
        const ambientLight = new THREE.AmbientLight(0x222222);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xfff5e0, 1.2);
        dirLight.position.set(3, 8, 2);
        dirLight.castShadow = true;
        scene.add(dirLight);
        const fillLight = new THREE.PointLight(0xc97e3a, 0.5);
        fillLight.position.set(0, -1, 0);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0x3a6ea5, 0.6);
        backLight.position.set(-2, 1, -5);
        scene.add(backLight);
        const rimLight = new THREE.PointLight(0xffaa55, 0.45);
        rimLight.position.set(2, 2, 4);
        scene.add(rimLight);
        const hemiLight = new THREE.HemisphereLight(0x6c7f9e, 0x2d2a24, 0.5);
        scene.add(hemiLight);
        
        // Sol décoratif
        const gridHelper = new THREE.GridHelper(22, 24, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.7;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.25;
        scene.add(gridHelper);
        
        const ringGeometry = new THREE.TorusGeometry(4.2, 0.05, 64, 200);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0x442200, roughness: 0.3, metalness: 0.7 });
        const ring = new THREE.Mesh(ringGeometry, ringMat);
        ring.rotation.x = Math.PI / 2;
        ring.position.y = -0.65;
        scene.add(ring);
        
        // Matériaux sphères
        const materialMain = new THREE.MeshStandardMaterial({
            color: 0xe7b42c,
            emissive: 0x442200,
            roughness: 0.25,
            metalness: 0.85,
            emissiveIntensity: 0.4
        });
        const materialSub = new THREE.MeshStandardMaterial({
            color: 0x3a7ca5,
            emissive: 0x113355,
            roughness: 0.4,
            metalness: 0.65,
            emissiveIntensity: 0.25
        });
        const materialCopyright = new THREE.MeshStandardMaterial({
            color: 0xb86f9c,
            emissive: 0x3a1e2e,
            roughness: 0.3,
            metalness: 0.7,
            emissiveIntensity: 0.35
        });
        
        const meshes = [];
        
        // Fonction pour ajouter une sphère et son label
        function addNodeToScene(node, material, radius, yOffsetLabel = 0.75) {
            const sphere = new THREE.Mesh(new THREE.SphereGeometry(radius, 48, 32), material);
            sphere.position.copy(node.position);
            sphere.castShadow = true;
            sphere.userData = { nodeId: node.id, pdfUrl: node.pdf, label: node.label, type: node.type, fullText: node.fullText };
            scene.add(sphere);
            meshes.push(sphere);
            
            if (node.type === 'main') {
                const glowMat = new THREE.MeshBasicMaterial({ color: 0xffaa55, transparent: true, opacity: 0.2 });
                const glowSphere = new THREE.Mesh(new THREE.SphereGeometry(radius + 0.14, 24, 24), glowMat);
                glowSphere.position.copy(node.position);
                scene.add(glowSphere);
            }
            
            // Pour le nœud copyright, l'étiquette doit afficher un texte multiligne, donc on utilise un div personnalisé
            let div;
            if (node.type === 'copyright') {
                div = document.createElement('div');
                div.style.backgroundColor = 'rgba(30, 20, 35, 0.9)';
                div.style.color = '#f0d8ff';
                div.style.fontSize = '11px';
                div.style.fontWeight = '500';
                div.style.padding = '12px 16px';
                div.style.borderRadius = '20px';
                div.style.border = '2px solid #c97eae';
                div.style.backdropFilter = 'blur(8px)';
                div.style.width = '280px';
                div.style.fontFamily = "'Segoe UI', 'Inter', sans-serif";
                div.style.textAlign = 'center';
                div.style.lineHeight = '1.4';
                div.style.whiteSpace = 'normal';
                div.style.wordBreak = 'break-word';
                div.style.boxShadow = '0 0 20px rgba(185, 110, 140, 0.6)';
                div.innerHTML = node.label.replace('⚖️', '⚖️') + '<br><span style="font-size:9px; opacity:0.8;">🔒 Cliquez pour lire l’intégralité des droits</span>';
            } else {
                div = document.createElement('div');
                div.textContent = node.label;
                div.style.backgroundColor = 'rgba(0, 0, 0, 0.7)';
                div.style.color = node.type === 'main' ? '#ffecb3' : '#d9edff';
                div.style.fontSize = '14px';
                div.style.fontWeight = '600';
                div.style.padding = '6px 14px';
                div.style.borderRadius = '28px';
                div.style.border = `1px solid ${node.type === 'main' ? '#ffcf4a' : '#3f8ec7'}`;
                div.style.backdropFilter = 'blur(6px)';
                div.style.whiteSpace = 'nowrap';
                div.style.boxShadow = '0 2px 8px rgba(0,0,0,0.3)';
            }
            div.style.pointerEvents = 'none';
            const labelObj = new CSS2DObject(div);
            labelObj.position.copy(node.position);
            labelObj.position.y += yOffsetLabel;
            scene.add(labelObj);
        }
        
        // Ajout des nœuds existants
        allNodes.forEach(node => {
            if (node.type === 'main') {
                addNodeToScene(node, materialMain, 0.52, 0.85);
            } else if (node.type === 'sub') {
                addNodeToScene(node, materialSub, 0.42, 0.75);
            } else if (node.type === 'copyright') {
                addNodeToScene(node, materialCopyright, 0.48, 0.95);
            }
        });
        
        // Liens (lignes) pour les sous-nœuds
        const lineMaterial = new THREE.LineBasicMaterial({ color: 0x6f9bdf, transparent: true, opacity: 0.65 });
        subNodesList.forEach(subNode => {
            const parentNode = allNodes.find(n => n.id === subNode.parentId);
            if (!parentNode) return;
            const points = [parentNode.position.clone(), subNode.position.clone()];
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const line = new THREE.Line(geometry, lineMaterial);
            scene.add(line);
        });
        
        // Particules ambiantes
        const particleCount = 800;
        const particleGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 28;
            particlePositions[i*3+1] = (Math.random() - 0.5) * 6 - 1;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 24;
        }
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.06, transparent: true, opacity: 0.4 });
        const stars = new THREE.Points(particleGeometry, particleMat);
        scene.add(stars);
        
        function animateParticles() {
            stars.rotation.y += 0.0015;
            stars.rotation.x += 0.0008;
            requestAnimationFrame(animateParticles);
        }
        animateParticles();
        
        // Arcs décoratifs
        function addArcHelper(parentPos, group, subCount) {
            const outwardDir = parentPos.clone().sub(centerTriangle).normalize();
            let baseAngle = Math.atan2(outwardDir.z, outwardDir.x);
            const startAngle = baseAngle - arcAngleRange/2;
            const endAngle = baseAngle + arcAngleRange/2;
            const points = [];
            const segments = 50;
            for (let i = 0; i <= segments; i++) {
                const t = i / segments;
                const angle = startAngle + t * arcAngleRange;
                const px = parentPos.x + arcRadius * Math.cos(angle);
                const pz = parentPos.z + arcRadius * Math.sin(angle);
                points.push(new THREE.Vector3(px, 0.08, pz));
            }
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const arcMat = new THREE.LineBasicMaterial({ color: 0xffaa66, transparent: true, opacity: 0.3 });
            const arcLine = new THREE.Line(lineGeo, arcMat);
            scene.add(arcLine);
        }
        
        allNodes.filter(n => n.type === 'main').forEach(mainNode => {
            const subCount = (mainNode.group === 'enonce') ? 4 : (mainNode.group === 'annexes') ? 6 : 8;
            addArcHelper(mainNode.position, mainNode.group, subCount);
        });
        
        // Noyau lumineux central
        const coreGlow = new THREE.Mesh(
            new THREE.SphereGeometry(0.22, 24, 24),
            new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0xff4411, emissiveIntensity: 1.3 })
        );
        coreGlow.position.set(0, 0, 0);
        scene.add(coreGlow);
        
        // Titre principal CSS2D
        const titleDiv = document.createElement('div');
        titleDiv.textContent = '🏁 PBL : Red Bull Sky & Dirt Challenge 🏁';
        titleDiv.style.fontSize = '48px';
        titleDiv.style.fontWeight = 'bold';
        titleDiv.style.fontFamily = "'Impact', 'Arial Black', sans-serif";
        titleDiv.style.color = '#ffd966';
        titleDiv.style.textShadow = '3px 3px 0px #aa6f20, 0 0 12px #ffaa33';
        titleDiv.style.background = 'linear-gradient(135deg, #1e1a2f, #0a0a1a)';
        titleDiv.style.padding = '12px 28px';
        titleDiv.style.borderRadius = '60px';
        titleDiv.style.border = '2px solid #ffcc44';
        titleDiv.style.boxShadow = '0 0 25px rgba(255,200,0,0.5)';
        titleDiv.style.backdropFilter = 'blur(8px)';
        titleDiv.style.whiteSpace = 'nowrap';
        titleDiv.style.letterSpacing = '1px';
        const titleObject = new CSS2DObject(titleDiv);
        titleObject.position.set(0, 3.2, 0);
        scene.add(titleObject);
        
        const subDiv = document.createElement('div');
        subDiv.textContent = '📐 Trigonométrie | Suites | Dérivation | Produit scalaire | Probabilités 📊';
        subDiv.style.fontSize = '16px';
        subDiv.style.fontFamily = 'monospace';
        subDiv.style.color = '#bbccff';
        subDiv.style.backgroundColor = 'rgba(0,0,0,0.5)';
        subDiv.style.padding = '4px 16px';
        subDiv.style.borderRadius = '30px';
        subDiv.style.backdropFilter = 'blur(5px)';
        const subTitleObject = new CSS2DObject(subDiv);
        subTitleObject.position.set(0, 2.4, 0);
        scene.add(subTitleObject);
        
        // Raycaster pour les clics
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        function onMouseClick(event) {
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(meshes);
            if (intersects.length > 0) {
                const hit = intersects[0].object;
                const userData = hit.userData;
                if (userData && userData.pdfUrl) {
                    window.open(userData.pdfUrl, '_blank');
                } else if (userData && userData.type === 'copyright') {
                    // Afficher le texte complet des droits d'auteur dans une alerte
                    alert(copyrightNode.fullText);
                } else {
                    if (userData && userData.type === 'main') {
                        if (userData.label.includes('ANNEXES')) {
                            alert("📁 Annexes : 6 documents. Cliquez sur les sphères bleues autour.");
                        } else if (userData.label.includes('CARTES')) {
                            alert("🎴 Cartes Joker : 8 fiches. Cliquez sur les sphères périphériques.");
                        } else if (userData.label.includes('ÉNONCÉ')) {
                            alert("📄 L'énoncé principal ouvre le PDF challenge. Sous-documents dans l'arc.");
                        } else {
                            alert(`ℹ️ "${userData.label}" : accédez aux sous-ressources via les satellites.`);
                        }
                    } else {
                        alert(`Document non disponible directement : ${userData.label}`);
                    }
                }
            }
        }
        
        window.addEventListener('click', onMouseClick, false);
        
        function animate() {
            controls.update();
            const time = Date.now() * 0.002;
            rimLight.intensity = 0.45 + Math.sin(time) * 0.1;
            fillLight.intensity = 0.5 + Math.sin(time * 0.7) * 0.12;
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log("Graphe 3D avec étoile solitaire des droits d'auteur - Tous les PDF sont couverts par la licence.");
    </script>
</body>
</html>
